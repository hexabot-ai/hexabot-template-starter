services:
  api:
    build:
      context: ../
      dockerfile: ./Dockerfile
      target: production
    pull_policy: build
    env_file: ../.env.docker
    ports:
      - 3000:3000
    networks:
      - app-network
    volumes:
      - api-data:/app/uploads
      - api-sqlite-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  api-data:
  api-sqlite-data:

networks:
  app-network:
