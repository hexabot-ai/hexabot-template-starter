services:
  api:
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-network
      - app-network

  postgres:
    container_name: postgres
    hostname: postgres
    image: postgres:16-alpine
    restart: always
    env_file: ../.env.docker
    environment:
      POSTGRES_USER: ${DB_USERNAME:-dev_only}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_only}
      POSTGRES_DB: ${DB_NAME:-hexabot}
    networks:
      db-network:
        aliases:
          - postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -d \"$${POSTGRES_DB}\" -U \"$${POSTGRES_USER}\""
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

networks:
  db-network:
